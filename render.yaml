services:
  - type: web
    name: aixuexi-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run migrate
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: AI_API_BASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: gpt-4.1-mini
      - key: AI_VISION_MODEL
        value: gpt-4.1-mini
      - key: MAX_JSON_MB
        value: 30
