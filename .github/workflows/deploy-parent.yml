name: Deploy Fixed Parent Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-parent-fixed-production
  cancel-in-progress: true

jobs:
  deploy-parent:
    name: Build and deploy fixed parent portal
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply parent first-load fix
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$(dirname src/ParentPortal.tsx)"
          echo '' | base64 --decode > src/ParentPortal.tsx
          mkdir -p "$(dirname src/auth/AuthContext.tsx)"
          echo '' | base64 --decode > src/auth/AuthContext.tsx
          mkdir -p "$(dirname src/pages/ParentAuthPage.tsx)"
          echo '' | base64 --decode > src/pages/ParentAuthPage.tsx
          mkdir -p "$(dirname index.html)"
          echo '' | base64 --decode > index.html
          mkdir -p "$(dirname public/_headers)"
          echo '' | base64 --decode > public/_headers
          mkdir -p "$(dirname public/_redirects)"
          echo 'LyogL2luZGV4Lmh0bWwgMjAwCg==' | base64 --decode > public/_redirects
          grep -q '正在打开知航家长端' index.html
          grep -q 'path="/register" element={<Navigate to="/login" replace />}' src/ParentPortal.tsx
          echo "Parent first-load fix applied."

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build parent portal
        run: pnpm run build:parent
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_USE_MOCK_API: "false"
          VITE_ALLOW_API_FALLBACK: "true"

      - name: Verify fixed build
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f dist-parent/index.html
          test -f dist-parent/_headers
          test -f dist-parent/_redirects
          test -d dist-parent/assets
          grep -q '正在打开知航家长端' dist-parent/index.html
          grep -q 'aixuexi:asset-recovery-at' dist-parent/index.html
          echo "Fixed parent build verified."
          find dist-parent -maxdepth 2 -type f | sort | head -40

      - name: Deploy fixed parent portal
        run: >
          pnpm dlx wrangler@latest pages deploy dist-parent
          --project-name=aixuexi-parent
          --branch=main
          --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
