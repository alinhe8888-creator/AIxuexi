name: Deploy Parent Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-parent-production
  cancel-in-progress: true

jobs:
  deploy-parent:
    name: Build and deploy parent portal
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build parent portal
        run: pnpm run build:parent
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_USE_MOCK_API: "false"
          VITE_ALLOW_API_FALLBACK: "true"

      - name: Verify build output
        run: |
          test -f dist-parent/index.html
          echo "Parent portal build verified"
          find dist-parent -maxdepth 2 -type f | head -30

      - name: Deploy parent portal
        run: >
          pnpm dlx wrangler@latest pages deploy dist-parent
          --project-name=aixuexi-parent
          --branch=main
          --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
