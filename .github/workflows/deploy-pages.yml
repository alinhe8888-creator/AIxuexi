name: Deploy AI Learning Assistant to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true


jobs:

  build:

    runs-on: ubuntu-24.04

    timeout-minutes: 20

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0


      - name: Check environment
        run: |
          node -v
          npm -v


      - name: Install dependencies
        run: |
          npm cache clean --force
          npm install


      - name: Lint
        run: npm run lint


      - name: Type check
        run: npm run typecheck


      - name: Build
        run: npm run build


      - name: Configure Pages
        uses: actions/configure-pages@v5


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist



  deploy:

    needs: build

    runs-on: ubuntu-24.04

    environment:
      name: github-pages


    steps:

      - name: Deploy
        uses: actions/deploy-pages@v4
