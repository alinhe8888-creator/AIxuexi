name: Deploy AIxuexi Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write


jobs:
  deploy:

    environment:
      name: github-pages

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Verify dist
        run: |
          test -f dist/index.html


      - name: Configure Pages
        uses: actions/configure-pages@v5


      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist


      - name: Deploy Pages
        uses: actions/deploy-pages@v4
